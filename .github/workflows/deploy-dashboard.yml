name: Build & Deploy Dashboard

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'LICENSE'
  workflow_dispatch:

concurrency:
  group: deploy-dashboard
  cancel-in-progress: true

jobs:
  # ================================================================
  # PREFLIGHT — kötelező minőségi kapu
  # ================================================================
  preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      status: ${{ steps.result.outputs.status }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # ── 1. TypeScript type check ──
      - name: TypeScript check
        run: npx tsc --noEmit
        shell: bash

      # ── 2. ESLint ──
      - name: ESLint
        run: npx eslint src/ --max-warnings 0 2>/dev/null || npx eslint src/ --quiet
        shell: bash
        continue-on-error: true

      # ── 3. Build dry-run ──
      - name: Build check
        run: npm run build
        env:
          VITE_API_BASE: /api

      - name: Preflight result
        id: result
        if: success()
        run: echo "status=passed" >> $GITHUB_OUTPUT

  # ================================================================
  # DEPLOY — CSAK akkor indul, ha preflight PASS
  # ================================================================
  deploy:
    needs: [preflight]
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE: ${{ vars.VITE_API_BASE || '/api' }}

      - name: Deploy via rsync
        uses: easingthemes/ssh-deploy@v5
        with:
          SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_KEY }}
          ARGS: '-avz --delete'
          SOURCE: 'dist/'
          REMOTE_HOST: ${{ secrets.VPS_HOST }}
          REMOTE_USER: ${{ secrets.VPS_USER }}
          TARGET: /var/www/clawdius-dashboard/
          SCRIPT_BEFORE: |
            whoami
          SCRIPT_AFTER: |
            cd /root/clawdius-dashboard
            pm2 startOrReload ecosystem.config.js --only clawdius-dashboard
            pm2 save
